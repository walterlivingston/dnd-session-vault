<!-- _layouts/default.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/sidebar.css' | relative_url }}">
</head>
<body>
  <div class="container">
    {% include sidebar.html %}
    <div class="content">
      {{ content }}
    </div>
  </div>
  
  <script>
    // Add toggle functionality for folders
    document.querySelectorAll('.folder-name').forEach(folder => {
      folder.addEventListener('click', function() {
        const folderContents = this.nextElementSibling;
        if (folderContents.style.display === 'none') {
          folderContents.style.display = 'block';
          this.classList.add('open');
        } else {
          folderContents.style.display = 'none';
          this.classList.remove('open');
        }
      });
    });
  </script>
</body>
</html>
